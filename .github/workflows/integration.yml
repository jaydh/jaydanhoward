name: Integration
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright Integration Tests
    runs-on: arc-runner-set-k8s
    container:
      image: ${{ vars.RUNNER_IMAGE_URL }}
      options: --privileged
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build and load image
        run: bazel --bazelrc=.bazelrc.ci run :jaydanhoward_image_amd64_load

      - name: Start Postgres
        run: |
          docker run -d --name test-pg \
            --network host \
            -e POSTGRES_USER=jaydanhoward \
            -e POSTGRES_PASSWORD=testpass \
            -e POSTGRES_DB=jaydanhoward \
            postgres:16-alpine
          for i in $(seq 1 30); do
            docker exec test-pg pg_isready -U jaydanhoward -q && break || sleep 1
          done

      - name: Start app
        run: |
          docker run -d --name test-app \
            --network host \
            -e DATABASE_URL="postgresql://jaydanhoward:testpass@127.0.0.1:5432/jaydanhoward" \
            -e PROMETHEUS_URL="http://127.0.0.1:9090" \
            jaydanhoward:ci
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health_check && break || sleep 2
          done

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run Playwright tests
        env:
          BASE_URL: http://127.0.0.1:8000
        run: npx playwright test --reporter=github,html

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: App logs on failure
        if: failure()
        run: docker logs test-app 2>&1 | tail -100

      - name: Cleanup
        if: always()
        run: docker rm -f test-app test-pg 2>/dev/null || true
