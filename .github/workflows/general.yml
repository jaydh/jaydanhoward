name: Rust
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  security-audit:
    name: Security Audit
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Fetch advisory database
        run: |
          git clone --depth=1 https://github.com/RustSec/advisory-db.git ~/.cargo/advisory-db \
            || git -C ~/.cargo/advisory-db pull --ff-only
      - name: Run security audit
        run: |
          bazel --bazelrc=.bazelrc.ci test //:security_audit --test_output=all
  clippy:
    name: Clippy
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Clippy
        run: |
          bazel --bazelrc=.bazelrc.ci build clippy
  integration-test:
    name: Integration Test
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [clippy]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Build binary
        # Clippy already built this — Bazel remote cache makes this nearly instant
        run: bazel --bazelrc=.bazelrc.ci build :jaydanhoward_bin
      - name: Start app
        # No DATABASE_URL or PROMETHEUS_URL: runs in memory-only mode.
        # Redirect output to file so the background process doesn't keep the
        # step's stdout/stderr open (which would hang the step indefinitely).
        run: |
          ./bazel-bin/jaydanhoward_bin > /tmp/app.log 2>&1 &
          echo $! > /tmp/app.pid
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health_check && break || sleep 2
          done
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps
      - name: Run Playwright tests
        env:
          BASE_URL: http://127.0.0.1:8000
        run: npx playwright test --reporter=github,html
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
      - name: App logs on failure
        if: failure()
        run: |
          echo "=== app stdout/stderr ==="
          cat /tmp/app.log 2>/dev/null || true
      - name: Cleanup
        if: always()
        run: |
          [ -f /tmp/app.pid ] && kill $(cat /tmp/app.pid) 2>/dev/null || true

  harbor-image-x86_64-push:
    if: github.event_name == 'push'
    name: Push JDH Image - x86_64
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [clippy, security-audit, integration-test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run jaydanhoward_image_amd64_push -- \
            --repository=${{ vars.HARBOR_HOST }}/library/jaydanhoward
  harbor-image-arm64-push:
    if: github.event_name == 'push'
    needs: [clippy, security-audit, integration-test]
    name: Push JDH Image - arm64
    runs-on: arc-runner-set-arm-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run jaydanhoward_image_arm64_push -- \
            --repository=${{ vars.HARBOR_HOST }}/library/jaydanhoward
  security-audit-image-push:
    if: github.event_name == 'push'
    name: Push Security Audit Image
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run security_audit_image_push -- \
            --repository=${{ vars.HARBOR_HOST }}/library/security-audit
  harbor-manifest:
    if: github.event_name == 'push'
    name: Push Multi-Arch Manifest
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [harbor-image-x86_64-push, harbor-image-arm64-push]
    steps:
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Create and Push Multi-Arch Manifest
        run: |
          TAG=$(date -u +%Y%m%d-%H%M%S)
          docker manifest create ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-amd64 \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-arm64
          docker manifest push ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest
          docker manifest create ${{ vars.HARBOR_HOST }}/library/jaydanhoward:${TAG} \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-amd64 \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-arm64
          docker manifest push ${{ vars.HARBOR_HOST }}/library/jaydanhoward:${TAG}
