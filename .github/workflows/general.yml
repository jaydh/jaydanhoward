name: Rust
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  security-audit:
    name: Security Audit
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Run security audit
        run: |
          bazel --bazelrc=.bazelrc.ci test //:security_audit
  clippy:
    name: Clippy
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Clippy
        run: |
          bazel --bazelrc=.bazelrc.ci build clippy
  harbor-image-x86_64-push:
    if: github.event_name == 'push'
    name: Push JDH Image - x86_64
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [clippy, security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Harbor CA cert
        run: |
          openssl s_client -connect harbor.home.local:443 </dev/null 2>/dev/null \
            | sed -ne '/-BEGIN CERTIFICATE-/,/-END CERTIFICATE-/p' \
            > /tmp/harbor.crt
          sudo cp /tmp/harbor.crt /usr/local/share/ca-certificates/harbor.crt
          sudo update-ca-certificates
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"harbor.home.local":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run jaydanhoward_image_amd64_push
  harbor-image-arm64-push:
    if: github.event_name == 'push'
    needs: [clippy, security-audit]
    name: Push JDH Image - arm64
    runs-on: arc-runner-set-arm-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install Harbor CA cert
        run: |
          openssl s_client -connect harbor.home.local:443 </dev/null 2>/dev/null \
            | sed -ne '/-BEGIN CERTIFICATE-/,/-END CERTIFICATE-/p' \
            > /tmp/harbor.crt
          sudo cp /tmp/harbor.crt /usr/local/share/ca-certificates/harbor.crt
          sudo update-ca-certificates
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"harbor.home.local":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run jaydanhoward_image_arm64_push
  harbor-manifest:
    if: github.event_name == 'push'
    name: Push Multi-Arch Manifest
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [harbor-image-x86_64-push, harbor-image-arm64-push]
    steps:
      - name: Install Harbor CA cert
        run: |
          openssl s_client -connect harbor.home.local:443 </dev/null 2>/dev/null \
            | sed -ne '/-BEGIN CERTIFICATE-/,/-END CERTIFICATE-/p' \
            > /tmp/harbor.crt
          sudo cp /tmp/harbor.crt /usr/local/share/ca-certificates/harbor.crt
          sudo update-ca-certificates
          sudo mkdir -p /etc/docker/certs.d/harbor.home.local
          sudo cp /tmp/harbor.crt /etc/docker/certs.d/harbor.home.local/ca.crt
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"harbor.home.local":{"auth":"%s"}}}' \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Create and Push Multi-Arch Manifest
        run: |
          TAG=$(date -u +%Y%m%d-%H%M%S)
          docker manifest create harbor.home.local/library/jaydanhoward:latest \
            --amend harbor.home.local/library/jaydanhoward:latest-amd64 \
            --amend harbor.home.local/library/jaydanhoward:latest-arm64
          docker manifest push harbor.home.local/library/jaydanhoward:latest
          docker manifest create harbor.home.local/library/jaydanhoward:${TAG} \
            --amend harbor.home.local/library/jaydanhoward:latest-amd64 \
            --amend harbor.home.local/library/jaydanhoward:latest-arm64
          docker manifest push harbor.home.local/library/jaydanhoward:${TAG}
