name: Rust
on:
  pull_request:
    branches: ["main"]
  push:
    branches: ["main"]
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
env:
  CARGO_TERM_COLOR: always
jobs:
  security-audit:
    name: Security Audit
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Fetch advisory database
        run: |
          git clone --depth=1 https://github.com/RustSec/advisory-db.git ~/.cargo/advisory-db \
            || git -C ~/.cargo/advisory-db pull --ff-only
      - name: Run security audit
        run: |
          bazel --bazelrc=.bazelrc.ci test //:security_audit --test_output=all
  clippy:
    name: Clippy
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Clippy
        run: |
          bazel --bazelrc=.bazelrc.ci build clippy
  harbor-image-x86_64-push:
    if: github.event_name == 'push'
    name: Push JDH Image - x86_64
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [clippy, security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run jaydanhoward_image_amd64_push -- \
            --repository=${{ vars.HARBOR_HOST }}/library/jaydanhoward
  harbor-image-arm64-push:
    if: github.event_name == 'push'
    needs: [clippy, security-audit]
    name: Push JDH Image - arm64
    runs-on: arc-runner-set-arm-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run jaydanhoward_image_arm64_push -- \
            --repository=${{ vars.HARBOR_HOST }}/library/jaydanhoward
  security-audit-image-push:
    if: github.event_name == 'push'
    name: Push Security Audit Image
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [security-audit]
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Bazel Push
        run: |
          bazel --bazelrc=.bazelrc.ci run security_audit_image_push -- \
            --repository=${{ vars.HARBOR_HOST }}/library/security-audit
  harbor-manifest:
    if: github.event_name == 'push'
    name: Push Multi-Arch Manifest
    runs-on: arc-runner-set-k8s
    container: ${{ vars.RUNNER_IMAGE_URL }}
    needs: [harbor-image-x86_64-push, harbor-image-arm64-push]
    steps:
      - name: Login to Harbor
        run: |
          mkdir -p ~/.docker
          printf '{"auths":{"%s":{"auth":"%s"}}}' \
            "${{ vars.HARBOR_HOST }}" \
            "$(printf '%s:%s' '${{ secrets.HARBOR_USER }}' '${{ secrets.HARBOR_TOKEN }}' | base64 -w0)" \
            > ~/.docker/config.json
      - name: Create and Push Multi-Arch Manifest
        run: |
          TAG=$(date -u +%Y%m%d-%H%M%S)
          docker manifest create ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-amd64 \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-arm64
          docker manifest push ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest
          docker manifest create ${{ vars.HARBOR_HOST }}/library/jaydanhoward:${TAG} \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-amd64 \
            --amend ${{ vars.HARBOR_HOST }}/library/jaydanhoward:latest-arm64
          docker manifest push ${{ vars.HARBOR_HOST }}/library/jaydanhoward:${TAG}
